    stack:
      - Pandas
      - NumPy
      - scikit-learn
    bullets:
      - Kept memory and runtime under control while training strong baselines on hundreds of thousands of rows.
      - Random forest reached about 95.0% validation accuracy; tuned soft voting edged slightly higher after dropping weaker voters.
      - Contrasted single-tree behavior with bagging-style mini forests: average single-tree test accuracy near 82%, best single near 86%, majority vote near 85.9% on the same test split as in the notebook.

  - name: Azerbaijani news classification (TF–IDF)
    kind: course
