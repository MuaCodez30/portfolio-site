    stack:
      - Python
      - scikit-learn
      - TF–IDF
      - pandas
      - Plotly
    bullets:
      - Combined title and article text, dropped empty rows, and split into about eighty percent train and twenty percent test with class balance in mind.
      - On TF–IDF features, Naive Bayes scored about 77.6% test accuracy, the tree about 72.3%, and the linear SVM about 83.2%, each with a full precision-recall table in the notebook.
      - Grid search nudged the tree and Bayes settings; added TruncatedSVD plus an interactive 3D scatter so category separation is visible, not only a table.

  - name: Cleaning robot gridworld (MDP + Q-learning)
    kind: course
    date: "2025-05"
    order: 5
    context: ADA University · artificial intelligence coursework · grid robot, dirt cells, and obstacles
    lede: Modeled a cleaning robot on a grid with walls, dirt, and optional movement slip. Solved the full MDP with value iteration and policy iteration from JSON configs, logged timings and policy comparisons, then added tabular Q-learning with epsilon-greedy exploration and scripts to line results up against the planning baseline.
    stack:
      - Python
      - NumPy
      - Matplotlib
      - Jupyter
    bullets:
      - States combine robot position with which dirt tiles are left; actions move or clean; rewards charge each step, pay off for cleaning, and penalize bumping obstacles, with stochastic slip driven from the config file.
      - On the saved ten-by-ten experiment, value iteration finished in about two and a half seconds, policy iteration in about twelve seconds, and the two optimal policies disagreed on three hundred one states while the value gap in the log stayed near zero point zero zero two.
      - Shipped a tabular Q-learning loop (roughly sixteen thousand Q entries in the saved RL log), notebooks, and plots; the saved RL evaluation still looks exploratory versus the planner, which matches the metrics file rather than claiming a tuned winning agent.

